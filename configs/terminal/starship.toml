# Starship Prompt Configuration
# @author <AUTHOR_NAME>
# Location: ~/.config/starship.toml

# Optimized for DDN/Kubernetes/Go development

format = """
[┌─](bold green)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$kubernetes\
$golang\
$python\
$docker_context\
$line_break\
[└─](bold green)$character"""

# Timeout for commands (faster prompt)
command_timeout = 500

[username]
format = "[$user]($style) "
style_user = "bold cyan"
show_always = true

[hostname]
format = "[@$hostname]($style) "
style = "bold yellow"
ssh_only = false
disabled = false

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
read_only = " 🔒"

[git_branch]
format = "on [$symbol$branch]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "🏳 "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
untracked = "?${count} "
stashed = "📦 "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "✘${count} "

[kubernetes]
format = 'via [☸ $context \($namespace\)]($style) '
style = "bold cyan"
disabled = false
detect_files = ['k8s', 'Dockerfile', 'deploy']

[golang]
format = "via [$symbol($version )]($style)"
symbol = "🐹 "
style = "bold cyan"
detect_extensions = ["go"]
detect_files = ["go.mod", "go.sum"]

[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = "🐍 "
style = "yellow bold"
pyenv_version_name = false

[docker_context]
format = "via [$symbol$context]($style) "
symbol = "🐳 "
style = "blue bold"
only_with_files = true
detect_files = ['docker-compose.yml', 'Dockerfile']

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"
vicmd_symbol = "[V](bold green)"

[cmd_duration]
format = "took [$duration]($style) "
min_time = 2000
style = "bold yellow"

[time]
disabled = false
format = "🕙[$time]($style) "
style = "bold white"
time_format = "%T"
