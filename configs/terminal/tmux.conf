# Tmux Configuration
# @author Abhishek Pandey
# Location: ~/.tmux.conf
# Purpose: Persistent terminal sessions for remote work

# === GENERAL SETTINGS ===

# Change prefix from Ctrl+b to Ctrl+a (easier to reach)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Enable mouse support
set -g mouse on

# Increase scrollback buffer
set-option -g history-limit 50000

# Start windows and panes at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable 256 colors
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Reduce escape time for Vim
set -s escape-time 0

# Increase repeat timeout
set -g repeat-time 600

# Display messages for 2 seconds
set -g display-time 2000

# === KEY BINDINGS ===

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split windows with intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim-like keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Synchronize panes (send commands to all panes)
bind S set-window-option synchronize-panes

# === STATUS BAR ===

# Enable status bar
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Status bar colors
set -g status-style 'bg=colour234 fg=colour137 dim'
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20

# Window status
setw -g window-status-current-style 'fg=colour1 bg=colour19 bold'
setw -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '
setw -g window-status-style 'fg=colour9 bg=colour18'
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

# === PANE BORDERS ===

set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour51'

# === COPY MODE (VI-STYLE) ===

# Use Vi mode for copy mode
setw -g mode-keys vi

# Copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Paste buffer
bind P paste-buffer

# === SESSION MANAGEMENT ===

# Easier session switching
bind C-j switch-client -n
bind C-k switch-client -p

# === PLUGINS (Optional - requires TPM) ===

# Tmux Plugin Manager
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'  # Save/restore sessions
# set -g @plugin 'tmux-plugins/tmux-continuum'  # Auto-save sessions
# set -g @plugin 'tmux-plugins/tmux-yank'       # Better clipboard

# Auto-restore sessions on server start
# set -g @continuum-restore 'on'

# Initialize TPM (keep at bottom)
# run '~/.tmux/plugins/tpm/tpm'

# === REMOTE-SPECIFIC SETTINGS ===

# Keep sessions alive even if disconnected
set -g destroy-unattached off

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# === CLIPBOARD INTEGRATION (macOS) ===

# Copy to system clipboard on macOS
if-shell "uname | grep -q Darwin" \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'

# Linux (requires xclip)
if-shell "uname | grep -q Linux" \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'
